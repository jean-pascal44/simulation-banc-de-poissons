<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Système de Vie Artificielle - Stable</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; font-family: sans-serif; }
        canvas { display: block; }
        #controls {
            position: absolute; top: 10px; right: 10px;
            background: rgba(30, 41, 59, 0.8); padding: 12px;
            border-radius: 8px; color: white; font-size: 12px;
            backdrop-filter: blur(4px); border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
        }
        .control-group { margin-bottom: 6px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div id="controls">
    <label class="control-group"><input type="checkbox" id="rule-sep" checked> 1. Anti-collision</label>
    <label class="control-group"><input type="checkbox" id="rule-coh" checked> 2. Cohésion (Diffuse)</label>
    <label class="control-group"><input type="checkbox" id="rule-ali" checked> 3. Alignement</label>
    <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin:8px 0;">
    <label class="control-group"><input type="checkbox" id="spawn-on" checked> Apparition continue</label>
</div>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const checkSep = document.getElementById('rule-sep');
    const checkCoh = document.getElementById('rule-coh');
    const checkAli = document.getElementById('rule-ali');
    const checkSpawn = document.getElementById('spawn-on');

    let points = [];
    let dangerPoints = [];
    let pointIdCounter = 0;

    const config = {
        popInitial: 120,
        popMax: 200,
        numDanger: 4,
        speedPop: 2.5,
        speedDangerBase: 1.6,
        radiusPop: 5,
        radiusDanger: 18,
        distAvoidDanger: 120
    };

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Danger {
        constructor(id) {
            this.id = id;
            this.targetSpeed = config.speedDangerBase;
            this.currentMaxSpeed = config.speedDangerBase;
            this.reset();
        }

        reset() {
            const side = Math.floor(Math.random() * 4);
            const margin = 100;
            if (side === 0) { this.x = -margin; this.y = Math.random() * canvas.height; }
            else if (side === 1) { this.x = canvas.width + margin; this.y = Math.random() * canvas.height; }
            else if (side === 2) { this.x = Math.random() * canvas.width; this.y = -margin; }
            else { this.x = Math.random() * canvas.width; this.y = canvas.height + margin; }

            const angle = Math.atan2(canvas.height/2 - this.y, canvas.width/2 - this.x) + (Math.random()-0.5);
            this.vx = Math.cos(angle) * config.speedDangerBase;
            this.vy = Math.sin(angle) * config.speedDangerBase;
        }

        update() {
            // Accélération/Décélération aléatoire
            if (Math.random() < 0.01) this.targetSpeed = config.speedDangerBase * (0.5 + Math.random() * 2);
            this.currentMaxSpeed += (this.targetSpeed - this.currentMaxSpeed) * 0.05;

            // Règle 1 entre dangers
            dangerPoints.forEach(other => {
                if (this.id === other.id) return;
                const dx = other.x - this.x, dy = other.y - this.y;
                const d = Math.sqrt(dx*dx + dy*dy);
                if (d < 60) {
                    this.vx -= dx * 0.01;
                    this.vy -= dy * 0.01;
                }
            });

            const s = Math.sqrt(this.vx**2 + this.vy**2);
            this.vx = (this.vx / s) * this.currentMaxSpeed;
            this.vy = (this.vy / s) * this.currentMaxSpeed;

            this.x += this.vx;
            this.y += this.vy;

            if (this.x < -200 || this.x > canvas.width + 200 || this.y < -200 || this.y > canvas.height + 200) {
                this.reset();
            }
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, config.radiusDanger, 0, Math.PI * 2);
            ctx.fillStyle = '#ef4444';
            ctx.shadowBlur = 15; ctx.shadowColor = '#ef4444';
            ctx.fill();
            ctx.shadowBlur = 0;
        }
    }

    class Point {
        constructor(id, x, y) {
            this.id = id;
            this.x = x ?? Math.random() * canvas.width;
            this.y = y ?? Math.random() * canvas.height;
            this.vx = (Math.random() - 0.5) * config.speedPop;
            this.vy = (Math.random() - 0.5) * config.speedPop;
            this.color = `hsl(${Math.random() * 360}, 70%, 65%)`;
        }

        update() {
            let sepX = 0, sepY = 0, aliX = 0, aliY = 0, cohX = 0, cohY = 0;
            let nCnt = 0;

            // Évitement Danger
            dangerPoints.forEach(d => {
                const dx = d.x - this.x, dy = d.y - this.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < config.distAvoidDanger) {
                    this.vx -= (dx / dist) * 0.5;
                    this.vy -= (dy / dist) * 0.5;
                }
            });

            // Anticipation bords
            const look = 50;
            if (this.x + (this.vx/config.speedPop)*look < 0) this.vx += 0.5;
            if (this.x + (this.vx/config.speedPop)*look > canvas.width) this.vx -= 0.5;
            if (this.y + (this.vy/config.speedPop)*look < 0) this.vy += 0.5;
            if (this.y + (this.vy/config.speedPop)*look > canvas.height) this.vy -= 0.5;

            points.forEach(other => {
                if (this.id === other.id) return;
                const dx = other.x - this.x, dy = other.y - this.y;
                const dist = Math.sqrt(dx*dx + dy*dy);

                if (checkSep.checked && dist < 30) {
                    sepX -= dx / dist; sepY -= dy / dist;
                } else if (checkCoh.checked && dist > 150 && dist < 300) {
                    cohX += dx / dist; cohY += dy / dist;
                } else if (checkAli.checked && dist < 100) {
                    aliX += other.vx; aliY += other.vy;
                    nCnt++;
                }
            });

            this.vx += sepX * 0.4 + cohX * 0.01;
            this.vy += sepY * 0.4 + cohY * 0.01;
            if (nCnt > 0) {
                this.vx += (aliX/nCnt - this.vx) * 0.05;
                this.vy += (aliY/nCnt - this.vy) * 0.05;
            }

            const s = Math.sqrt(this.vx**2 + this.vy**2);
            this.vx = (this.vx / s) * config.speedPop;
            this.vy = (this.vy / s) * config.speedPop;

            this.x += this.vx; this.y += this.vy;
            
            // Sécurité rebond
            if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
            if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
        }

        draw() {
            const angle = Math.atan2(this.vy, this.vx);
            ctx.save();
            ctx.translate(this.x, this.y); ctx.rotate(angle);
            ctx.beginPath();
            ctx.moveTo(config.radiusPop*2, 0); ctx.lineTo(-config.radiusPop, -config.radiusPop); ctx.lineTo(-config.radiusPop, config.radiusPop);
            ctx.fillStyle = this.color; ctx.fill();
            ctx.restore();
        }
    }

    function init() {
        points = []; dangerPoints = [];
        for (let i = 0; i < config.popInitial; i++) points.push(new Point(pointIdCounter++));
        for (let i = 0; i < config.numDanger; i++) dangerPoints.push(new Danger(i));
        setInterval(() => {
            if (checkSpawn.checked && points.length < config.popMax) {
                points.push(new Point(pointIdCounter++, -20, Math.random()*canvas.height));
            }
        }, 2000);
        animate();
    }

    function animate() {
        ctx.fillStyle = 'rgba(15, 23, 42, 0.3)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        dangerPoints.forEach(d => { d.update(); d.draw(); });
        points.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }

    init();
</script>
</body>
</html>
